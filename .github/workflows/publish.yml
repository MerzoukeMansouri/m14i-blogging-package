name: Publish Package

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.storybook/**'
      - 'stories/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm run build

      - name: Check if version changed
        id: check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if git tag | grep -q "^v${PACKAGE_VERSION}$"; then
            echo "Version v${PACKAGE_VERSION} already published"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "New version v${PACKAGE_VERSION} detected"
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "version=${PACKAGE_VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Create Git Tag
        if: steps.check.outputs.should_publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.check.outputs.version }}" -m "Release v${{ steps.check.outputs.version }}"
          git push origin "v${{ steps.check.outputs.version }}"

      - name: Publish to NPM
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.should_publish == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.check.outputs.version }}
          release_name: Release v${{ steps.check.outputs.version }}
          body: |
            ## Changes in v${{ steps.check.outputs.version }}

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ### Installation
            ```bash
            npm install m14i-blogging@${{ steps.check.outputs.version }}
            # or
            pnpm add m14i-blogging@${{ steps.check.outputs.version }}
            ```
          draft: false
          prerelease: false
