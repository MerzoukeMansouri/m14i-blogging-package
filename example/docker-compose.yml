# =============================================================================
# m14i-blogging Example — Docker Compose
# =============================================================================
# Complete self-hosted Supabase stack for local blog development.
#
# Services:
#   - db:       PostgreSQL 15 (Supabase fork with extensions)
#   - auth:     GoTrue (authentication & JWT)
#   - rest:     PostgREST (auto-generated REST API)
#   - storage:  Supabase Storage API (file uploads & management)
#   - imgproxy: Image transformations (resize, optimize, convert)
#   - kong:     API gateway (routes /auth, /rest, /storage to services)
#   - meta:     Postgres metadata service (required by Studio)
#   - studio:   Supabase Dashboard (http://localhost:3001)
#
# Usage:
#   cp .env.example .env
#   docker compose up -d
#   cd app && npm install && npm run dev
#
# Access:
#   - Supabase API:    http://localhost:54321
#   - Supabase Studio: http://localhost:3001
#   - Next.js App:     http://localhost:3000
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Core database
  # ---------------------------------------------------------------------------
  db:
    image: supabase/postgres:15.8.1.085
    container_name: m14i-blog-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-54322}:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: 3600
    volumes:
      - ./volumes/db/migrations/20260404000000_set_role_passwords.sql:/docker-entrypoint-initdb.d/migrations/20260404000000_set_role_passwords.sql:Z
      - ./volumes/db/migrations/20260405000000_create_blog_schema.sql:/docker-entrypoint-initdb.d/migrations/20260405000000_create_blog_schema.sql:Z
      - ./volumes/db/migrations/20260425000000_add_brand_settings.sql:/docker-entrypoint-initdb.d/migrations/20260425000000_add_brand_settings.sql:Z
      - ./volumes/db/migrations/20260427000000_create_blog_storage.sql:/docker-entrypoint-initdb.d/migrations/20260427000000_create_blog_storage.sql:Z
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # GoTrue — Authentication
  # ---------------------------------------------------------------------------
  auth:
    image: supabase/gotrue:v2.186.0
    container_name: m14i-blog-auth
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}

      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

      GOTRUE_SITE_URL: ${GOTRUE_SITE_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: ${GOTRUE_URI_ALLOW_LIST:-}
      GOTRUE_DISABLE_SIGNUP: ${GOTRUE_DISABLE_SIGNUP:-false}

      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${GOTRUE_JWT_EXP:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}

      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${GOTRUE_EXTERNAL_EMAIL_ENABLED:-true}
      GOTRUE_MAILER_AUTOCONFIRM: ${GOTRUE_MAILER_AUTOCONFIRM:-true}
      GOTRUE_SMS_AUTOCONFIRM: ${GOTRUE_SMS_AUTOCONFIRM:-true}

  # ---------------------------------------------------------------------------
  # PostgREST — Auto-generated REST API
  # ---------------------------------------------------------------------------
  rest:
    image: postgrest/postgrest:v12.2.3
    container_name: m14i-blog-rest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public,blog}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_MAX_ROWS: ${PGRST_DB_MAX_ROWS:-1000}
      PGRST_DB_USE_LEGACY_GUCS: "false"

  # ---------------------------------------------------------------------------
  # Storage — File uploads and management
  # ---------------------------------------------------------------------------
  storage:
    image: supabase/storage-api:v1.11.14
    container_name: m14i-blog-storage
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
      imgproxy:
        condition: service_started
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - storage-data:/var/lib/storage:z

  # ---------------------------------------------------------------------------
  # imgproxy — Image transformations
  # ---------------------------------------------------------------------------
  imgproxy:
    image: darthsim/imgproxy:v3.25.0
    container_name: m14i-blog-imgproxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      timeout: 5s
      interval: 5s
      retries: 3
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: ${IMGPROXY_ENABLE_WEBP_DETECTION:-true}
    volumes:
      - storage-data:/var/lib/storage:z

  # ---------------------------------------------------------------------------
  # Kong — API Gateway
  # ---------------------------------------------------------------------------
  kong:
    image: kong:3.9.1
    container_name: m14i-blog-kong
    restart: unless-stopped
    ports:
      - "${KONG_HTTP_PORT:-8000}:8000"
      - "${KONG_HTTPS_PORT:-8443}:8443"
    depends_on:
      auth:
        condition: service_started
      rest:
        condition: service_started
      storage:
        condition: service_started
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      KONG_NGINX_HTTP_CLIENT_HEADER_BUFFER_SIZE: 64k
      KONG_NGINX_HTTP_LARGE_CLIENT_HEADER_BUFFERS: 16 128k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ./volumes/api/kong.yml:/var/lib/kong/kong.yml:ro

  # ---------------------------------------------------------------------------
  # Studio — Supabase Dashboard (optional)
  # ---------------------------------------------------------------------------
  studio:
    image: supabase/studio:latest
    container_name: m14i-blog-studio
    restart: unless-stopped
    ports:
      - "${STUDIO_PORT:-3001}:3000"
    depends_on:
      kong:
        condition: service_started
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-Default Organization}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-Default Project}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY:-dummy}
      LOGFLARE_URL: http://localhost:4000
      NEXT_PUBLIC_ENABLE_LOGS: false
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres

  # ---------------------------------------------------------------------------
  # Postgres Meta — Required by Studio
  # ---------------------------------------------------------------------------
  meta:
    image: supabase/postgres-meta:v0.83.2
    container_name: m14i-blog-meta
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}

volumes:
  db-data:
    driver: local
  storage-data:
    driver: local
