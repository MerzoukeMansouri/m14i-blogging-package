name: Release & Deploy

on:
  push:
    branches:
      - main

# Sets permissions for GitHub Pages deployment
permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  pages: write

# Allow only one concurrent deployment
concurrency:
  group: "release-and-deploy"
  cancel-in-progress: false

jobs:
  release:
    name: Release Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
        run: pnpm audit signatures

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: |
          # Publish all packages with provenance
          pnpm publish -r --no-git-checks --access public

          # Create git tags for each published package
          for package in packages/*/package.json; do
            dir=$(dirname "$package")
            name=$(node -p "require('./$package').name")
            version=$(node -p "require('./$package').version")
            tag="${name}@${version}"

            echo "Creating tag: $tag"
            git tag "$tag" || echo "Tag $tag already exists"
          done

          # Push tags
          git push --tags origin main || echo "Some tags may already exist"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for package in packages/*/package.json; do
            dir=$(dirname "$package")
            name=$(node -p "require('./$package').name")
            version=$(node -p "require('./$package').version")
            tag="${name}@${version}"

            # Check if release already exists
            if ! gh release view "$tag" &>/dev/null; then
              echo "Creating release for $tag"
              gh release create "$tag" \
                --title "$name v$version" \
                --notes "See CHANGELOG.md for details" \
                --latest=false
            else
              echo "Release $tag already exists"
            fi
          done

  deploy-storybook:
    name: Deploy Storybook
    runs-on: ubuntu-latest
    # Run in parallel with release job
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm run build-storybook

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './storybook-static'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
